<style>
:root{
  --paper:#F6F2E8;
  --paper-deep:#EFE9DA;
  --ink:#182339;
  --ink-soft:#4B5670;
  --brass:#9C7A3C;
  --brass-deep:#7C5F2C;
  --brass-pale:#EADFC5;
  --card:#FFFFFF;
  --line:#DCD3BE;
  --danger:#A0402A;
  --danger-soft:#F3E1DB;
  --good:#2F6F4E;
  --shadow: 0 1px 2px rgba(24,35,57,.06), 0 6px 20px rgba(24,35,57,.07);
  --radius: 3px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:'Source Serif 4',serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:var(--brass-deep);}

.app{display:flex;min-height:100vh;}

/* ---------- Sidebar / Ledger rail ---------- */
.rail{
  width:250px;
  flex-shrink:0;
  background:var(--ink);
  color:#EDE7D6;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.rail-head{
  padding:28px 22px 18px;
  border-bottom:1px solid rgba(237,231,214,.14);
}
.rail-head .mark{
  width:38px;height:38px;border:1px solid var(--brass);
  color:var(--brass-pale);
  display:flex;align-items:center;justify-content:center;
  font-family:'Source Serif 4',serif;font-weight:700;font-size:16px;
  border-radius:50%;
  margin-bottom:10px;
}
.rail-head .name{font-family:'Source Serif 4',serif;font-size:17px;font-weight:600;line-height:1.3;}
.rail-head .role{font-size:11.5px;color:#B9B196;margin-top:4px;letter-spacing:.02em;}

.nav{list-style:none;margin:0;padding:10px 0;flex:1;}
.nav li{margin:0;}
.nav button{
  width:100%;text-align:left;background:none;border:none;color:#CFC8B2;
  padding:10px 22px;font-family:'Inter',sans-serif;font-size:13.5px;cursor:pointer;
  display:flex;align-items:center;gap:12px;
  border-left:2px solid transparent;
  transition:background .15s, color .15s, border-color .15s;
}
.nav button .idx{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#8A8368;width:18px;}
.nav button:hover{background:rgba(237,231,214,.06);color:#EDE7D6;}
.nav button.active{background:rgba(156,122,60,.18);color:#F3EBD6;border-left-color:var(--brass);font-weight:500;}
.nav button.active .idx{color:var(--brass-pale);}

.rail-foot{padding:16px 22px 22px;border-top:1px solid rgba(237,231,214,.14);}
.edit-toggle{
  width:100%;padding:9px 10px;border-radius:2px;border:1px solid rgba(237,231,214,.3);
  background:transparent;color:#EDE7D6;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.edit-toggle.on{background:var(--brass);border-color:var(--brass);color:#1a1305;font-weight:600;}
.rail-foot .hint{font-size:10.5px;color:#8A8368;margin-top:8px;line-height:1.5;}
.data-btns{display:flex;gap:6px;margin-top:10px;}
.data-btns button{flex:1;background:none;border:1px solid rgba(237,231,214,.22);color:#B9B196;font-size:10px;padding:6px 4px;border-radius:2px;cursor:pointer;font-family:'Inter',sans-serif;}
.data-btns button:hover{color:#EDE7D6;border-color:rgba(237,231,214,.5);}

/* ---------- Stage ---------- */
.stage{flex:1;min-width:0;padding:44px 56px 100px;max-width:980px;}
.pane{display:none;animation:fade .25s ease;}
.pane.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--brass-deep);margin:0 0 8px;
  display:flex;align-items:center;gap:10px;
}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--brass);}
.pane h1.title{font-size:30px;margin:0 0 6px;font-weight:600;}
.pane .lede{color:var(--ink-soft);font-size:14.5px;max-width:640px;line-height:1.6;margin-bottom:34px;}

/* Home hero */
.hero-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:38px 40px;box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.hero-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--brass);}
.hero-top{display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap;}
.avatar{
  width:84px;height:84px;border-radius:50%;background:var(--ink);color:var(--brass-pale);
  display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;
  font-size:30px;font-weight:600;flex-shrink:0;border:3px solid var(--brass-pale);
}
.hero-name{font-family:'Source Serif 4',serif;font-size:28px;font-weight:700;margin:0 0 4px;}
.hero-role{color:var(--brass-deep);font-weight:600;font-size:14.5px;margin-bottom:3px;}
.hero-inst{color:var(--ink-soft);font-size:13.5px;margin-bottom:14px;}
.hero-tag{font-size:13.5px;font-style:italic;color:var(--ink-soft);border-left:2px solid var(--brass-pale);padding-left:12px;}
.stat-row{display:flex;gap:0;margin-top:30px;border-top:1px solid var(--line);padding-top:22px;flex-wrap:wrap;}
.stat{padding:0 26px;border-right:1px solid var(--line);}
.stat:first-child{padding-left:0;}
.stat:last-child{border-right:none;}
.stat .num{font-family:'Source Serif 4',serif;font-size:26px;font-weight:700;color:var(--ink);}
.stat .lbl{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-top:2px;}
.home-links{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
.pill-link{
  font-size:12.5px;padding:8px 14px;border:1px solid var(--line);border-radius:20px;
  color:var(--ink);text-decoration:none;display:inline-flex;align-items:center;gap:6px;background:var(--paper);
}
.pill-link:hover{border-color:var(--brass);color:var(--brass-deep);}

/* Generic section header w/ edit button */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.sec-head h2{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:0;font-family:'Inter',sans-serif;font-weight:600;}
.btn{
  font-family:'Inter',sans-serif;font-size:12px;padding:7px 13px;border-radius:2px;cursor:pointer;
  border:1px solid var(--line);background:var(--card);color:var(--ink);
}
.btn:hover{border-color:var(--brass);color:var(--brass-deep);}
.btn.primary{background:var(--ink);color:#EDE7D6;border-color:var(--ink);}
.btn.primary:hover{background:var(--brass-deep);border-color:var(--brass-deep);color:#fff;}
.btn.danger{color:var(--danger);border-color:var(--danger-soft);}
.btn.danger:hover{background:var(--danger-soft);}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.sm{padding:4px 9px;font-size:11px;}

/* Cards used across list-based sections */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:12px;position:relative;box-shadow:var(--shadow);
}
.card .card-actions{position:absolute;top:14px;right:14px;display:none;gap:6px;}
.card:hover .card-actions{display:flex;}
.card-actions button{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--paper);
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
}
.card-actions button:hover{border-color:var(--brass);}
.card-actions button.del:hover{border-color:var(--danger);color:var(--danger);}
.tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;
  padding:2px 8px;border-radius:20px;margin-right:6px;font-weight:500;
}
.tag.sci{background:#E7EFE9;color:var(--good);}
.tag.scopus{background:var(--brass-pale);color:var(--brass-deep);}
.tag.other{background:#EEE;color:#666;}
.card h3{margin:0 0 6px;font-size:15.5px;font-family:'Source Serif 4',serif;font-weight:600;line-height:1.4;}
.card .meta{font-size:12.5px;color:var(--ink-soft);}
.card .sub{font-size:12px;color:var(--brass-deep);margin-top:4px;font-weight:500;}
.card .doi{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:6px;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  background:var(--card);border:1px solid var(--line);padding:7px 14px;border-radius:20px;font-size:12.5px;
  display:inline-flex;align-items:center;gap:8px;
}
.chip .x{cursor:pointer;color:var(--danger);font-weight:700;display:none;}
.editing .chip .x{display:inline;}
.chip-add{border:1px dashed var(--brass);color:var(--brass-deep);background:none;cursor:pointer;font-size:12.5px;padding:7px 14px;border-radius:20px;}

.stat-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:center;
  box-shadow:var(--shadow);position:relative;
}
.stat-card .num{font-family:'Source Serif 4',serif;font-size:32px;font-weight:700;color:var(--brass-deep);}
.stat-card .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

.empty{
  border:1px dashed var(--line);border-radius:var(--radius);padding:30px;text-align:center;color:var(--ink-soft);
  font-size:13px;
}

table.info-table{width:100%;border-collapse:collapse;}
table.info-table td{padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
table.info-table td:first-child{color:var(--ink-soft);width:220px;}
table.info-table td:last-child{font-weight:500;}

.subsection{margin-top:34px;}
.subsection .sub-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--brass-deep);margin-bottom:14px;font-weight:600;}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(22,30,49,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{
  background:var(--paper);border-radius:4px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.modal-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{margin:0;font-size:16px;font-family:'Source Serif 4',serif;}
.modal-head .close{cursor:pointer;font-size:18px;color:var(--ink-soft);background:none;border:none;}
.modal-body{padding:22px 26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
.field input,.field textarea,.field select{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:2px;font-family:'Inter',sans-serif;
  font-size:13.5px;background:#fff;color:var(--ink);
}
.field textarea{min-height:80px;resize:vertical;}
.modal-foot{padding:16px 26px 22px;display:flex;justify-content:flex-end;gap:10px;}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#EDE7D6;
  padding:11px 22px;border-radius:20px;font-size:12.5px;box-shadow:var(--shadow);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

footer.site-foot{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-soft);}

@media (max-width:860px){
  .rail{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:90;transition:transform .2s;}
  .rail.open{transform:translateX(0);}
  .stage{padding:24px 20px 90px;}
  .grid2,.grid3{grid-template-columns:1fr;}
  .mobile-bar{display:flex;}
}
.mobile-bar{display:none;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--ink);color:#EDE7D6;position:sticky;top:0;z-index:80;}
.mobile-bar button{background:none;border:1px solid rgba(237,231,214,.35);color:#EDE7D6;padding:6px 10px;border-radius:2px;font-size:12px;}

/* =========================================================
   MODAL ENGINE
   ========================================================= */
function openModal(title, fields, values, onSave){
  const root = document.getElementById('modalRoot');
  const fieldHtml = fields.map(f=>{
    const val = (values && values[f.key] !== undefined) ? values[f.key] : '';
    if(f.type==='textarea'){
      return `<div class="field"><label>${f.label}</label><textarea data-key="${f.key}">${escapeHtml(val)}</textarea></div>`;
    }
    if(f.type==='select'){
      const opts = f.options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('');
      return `<div class="field"><label>${f.label}</label><select data-key="${f.key}">${opts}</select></div>`;
    }
    return `<div class="field"><label>${f.label}</label><input type="text" data-key="${f.key}" value="${escapeAttr(val)}"></div>`;
  }).join('');

  root.innerHTML = `
    <div class="overlay" id="overlayEl">
      <div class="modal">
        <div class="modal-head"><h3>${title}</h3><button class="close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">${fieldHtml}</div>
        <div class="modal-foot">
          <button class="btn" onclick="closeModal()">Cancel</button>
          <button class="btn primary" id="modalSaveBtn">Save</button>
        </div>
      </div>
    </div>`;
  document.getElementById('overlayEl').addEventListener('click', e=>{ if(e.target.id==='overlayEl') closeModal(); });
  document.getElementById('modalSaveBtn').addEventListener('click', ()=>{
    const out = {};
    fields.forEach(f=>{
      const el = root.querySelector(`[data-key="${f.key}"]`);
      out[f.key] = el.value.trim();
    });
    onSave(out);
    closeModal();
  });
}
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }
function escapeHtml(s){ return String(s??'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escapeAttr(s){ return String(s??'').replace(/"/g,'&quot;'); }

function confirmDelete(msg, cb){
  if(confirm(msg)) cb();
}

      <div class="sec-head"><h2>Faculty Development Programs Attended</h2>${editMode ? `<button class="btn sm" onclick="addFdp()">+ Add FDP</button>` : ''}</div>
      ${fdpCards || emptyState('No FDPs added yet.')}
    </div>
  `;
}
const awardFields = [{key:'title', label:'Award / Achievement'}, {key:'year', label:'Year'}];

  openModal('Add Award', awardFields, {}, vals=>{
    DATA.awards.unshift({id: nextId(DATA.awards), ...vals}); saveData(); renderStage();
  });
}
function editAward(id){
  const item = DATA.awards.find(a=>a.id===id);
  openModal('Edit Award', awardFields, item, vals=>{ Object.assign(item, vals); saveData(); renderStage(); });
}
function deleteAward(id){
  confirmDelete('Delete this award?', ()=>{ DATA.awards = DATA.awards.filter(a=>a.id!==id); saveData(); renderStage(); });
}
const fdpFields = [{key:'text', label:'Programme Title'},{key:'place', label:'Host Institution'},{key:'date', label:'Dates'}];

    DATA.fdps.unshift({id: nextId(DATA.fdps), ...vals}); saveData(); renderStage();

function editFdp(id){
  const item = DATA.fdps.find(f=>f.id===id);
  openModal('Edit FDP', fdpFields, item, vals=>{ Object.assign(item, vals); saveData(); renderStage(); });
}
function deleteFdp(id){
  confirmDelete('Delete this FDP entry?', ()=>{ DATA.fdps = DATA.fdps.filter(f=>f.id!==id); saveData(); renderStage(); });
}

/* ---------- HELPERS ---------- */
function emptyState(msg){ return `<div class="empty">${msg}${editMode ? ' Use the button above to add one.' : ''}</div>`; }

/* ---------- DATA IMPORT / EXPORT / RESET ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'faculty-site-data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Exported JSON');
}
function importPrompt(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json';
  input.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const parsed = JSON.parse(ev.target.result);
        DATA = parsed; saveData(); renderNav(); renderStage();
        showToast('Data imported');
      }catch(err){ alert('That file is not valid JSON.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}
function resetPrompt(){
  if(confirm('Reset all content back to the original resume data? This cannot be undone.')){
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData(); renderNav(); renderStage();
  }
}

/* =========================================================
   INIT
   ========================================================= */
renderNav();
renderStage();
</script>
